name: Deploy ShopOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/duka
            git pull origin main
            echo "${{ secrets.PRODUCTION_ENV }}" > backend/.env
            docker compose down
            docker compose build
            docker compose up -d
            docker system prune -f
